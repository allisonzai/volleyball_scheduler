databases:
  - name: volleyball-db
    databaseName: volleyball
    user: volleyball

services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: volleyball-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: volleyball-db
          property: connectionString
      - key: MAX_PLAYERS
        value: 12
      - key: CONFIRM_TIMEOUT_SECONDS
        value: 300
      - key: VERIFICATION_EXPIRES_MINUTES
        value: 15
      - key: STUB_SMS
        value: true
      - key: STUB_PUSH
        value: true
      - key: STUB_EMAIL
        value: false
      - key: GMAIL_ADDRESS
        value: allisonazhang@gmail.com
      - key: GMAIL_APP_PASSWORD
        sync: false        # set manually in Render dashboard — never commit this
      - key: SMS_FROM_NUMBER
        value: "8588480458"
      - key: OPERATOR_SECRET
        sync: false        # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false        # set to your Render frontend URL after deploying
      - key: BASE_URL
        sync: false        # set to your Render backend URL after deploying

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: volleyball-frontend
    runtime: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false        # set to your Render backend URL after deploying
      - key: VITE_OPERATOR_SECRET
        sync: false        # set manually in Render dashboard
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
